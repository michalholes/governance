name: publish-governance-toolkit

on:
  push:
    branches:
      - main
    paths:
      - "src/governance/**"
      - "governance/governance.jsonl"
      - "governance/specification.jsonl"
      - ".github/workflows/publish-governance-toolkit.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build toolkit bundle and manifest
        shell: bash
        run: |
          set -euo pipefail

          ROOT="$GITHUB_WORKSPACE"
          OUT_DIR="$ROOT/artifacts/governance_toolkit"
          STAGE_DIR="$(mktemp -d)"
          TOOLKIT_ROOT="$STAGE_DIR/governance"

          mkdir -p "$OUT_DIR"
          mkdir -p "$TOOLKIT_ROOT"

          # Standalone toolkit files required by PatchHub/runtime
          cp "$ROOT/src/governance/pm_validator.py" "$TOOLKIT_ROOT/"
          cp "$ROOT/src/governance/pm_validator_runtime_support.py" "$TOOLKIT_ROOT/"
          cp "$ROOT/src/governance/pm_validator_pack_contract.py" "$TOOLKIT_ROOT/"
          cp "$ROOT/src/governance/pm_spec_validator.py" "$TOOLKIT_ROOT/"
          cp "$ROOT/src/governance/rc_resolver.py" "$TOOLKIT_ROOT/"
          cp "$ROOT/src/governance/validate_master_spec_v2.py" "$TOOLKIT_ROOT/"
          cp "$ROOT/src/governance/render_master_spec_txt.py" "$TOOLKIT_ROOT/"
          cp "$ROOT/src/governance/workflow_effective_context.py" "$TOOLKIT_ROOT/"
          cp "$ROOT/src/governance/gov_navigator.py" "$TOOLKIT_ROOT/"

          # Authority corpus
          cp "$ROOT/governance/governance.jsonl" "$TOOLKIT_ROOT/"
          cp "$ROOT/governance/specification.jsonl" "$TOOLKIT_ROOT/"

          # Optional package marker
          if [ -f "$ROOT/src/governance/__init__.py" ]; then
            cp "$ROOT/src/governance/__init__.py" "$TOOLKIT_ROOT/"
          fi

          TOOLKIT_ZIP="$OUT_DIR/toolkit.zip"
          rm -f "$TOOLKIT_ZIP"

          (
            cd "$STAGE_DIR"
            python -m zipfile -c "$TOOLKIT_ZIP" governance/*
          )

          ARCHIVE_SHA256="$(python - <<'PY'
from pathlib import Path
import hashlib
path = Path("artifacts/governance_toolkit/toolkit.zip")
print(hashlib.sha256(path.read_bytes()).hexdigest())
PY
          )"

          REMOTE_SIG="sha-${GITHUB_SHA}"
          MANIFEST_PATH="$OUT_DIR/manifest.json"
          ARCHIVE_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/artifacts/governance_toolkit/toolkit.zip"

          python - <<PY
from pathlib import Path
import json

manifest = {
    "remote_sig": "${REMOTE_SIG}",
    "archive_url": "${ARCHIVE_URL}",
    "archive_sha256": "${ARCHIVE_SHA256}",
}
Path("${MANIFEST_PATH}").write_text(
    json.dumps(manifest, indent=2, ensure_ascii=True) + "\n",
    encoding="utf-8",
)
PY

      - name: Commit published artifacts
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add artifacts/governance_toolkit/toolkit.zip artifacts/governance_toolkit/manifest.json

          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi

          git commit -m "Publish governance toolkit artifacts"
          git push
